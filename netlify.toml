[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_VERSION = "10.8.2"
  NPM_FLAGS = "--include=dev --include=optional --legacy-peer-deps --no-audit --no-fund"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."supabase-pulse"]
  schedule = "0 7 */5 * *"
